services:
  backend:
    image: ${IMAGE_NAME:-ghcr.io/hexyatina/catweek-backend:latest}
    env_file:
      - ../backend/.env.prod
    environment:
      APP_ENV: prod
      DB_ENV: remote
      PORT: "5000"
      WORKERS: "4"
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
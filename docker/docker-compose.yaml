services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile

    env_file:
      - ../backend/.env
    environment:
      APP_ENV: dev
      DB_ENV: local
      DATABASE_LOCAL: postgresql+psycopg://postgres:postgres@db:5432/postgres
      PORT: "5000"
      WORKERS: "4"
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - ../backend:/app
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: catweek
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catweek"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
